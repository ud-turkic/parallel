name: UD Validation

on:
  push:
    paths:
      - 'data/*.conllu'
      - 'scripts/validate_parallel.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install regex udapi

      - name: Clone UD tools
        run: git clone --depth 1 https://github.com/UniversalDependencies/tools.git

      - name: Run validation
        run: |
          mkdir -p validation
          failed=0
          for f in data/*.conllu; do
            base=$(basename "$f" .conllu)
            lang=$(echo "$base" | grep -oP '^\w+(?=_)')
            log="validation/${base}.log"
            echo "=== Validating $f (lang=$lang) ==="
            python tools/validate.py --lang "$lang" --max-err 0 "$f" 2>&1 | tee "$log"
            if ! grep -q '^\*\*\* PASSED \*\*\*' "$log"; then
              failed=1
            fi
          done
          echo "failed=$failed" >> "$GITHUB_ENV"

      - name: Show summary
        run: |
          echo "## Validation Summary"
          echo ""
          for log in validation/*.log; do
            base=$(basename "$log" .log)
            if grep -q '^\*\*\* PASSED \*\*\*' "$log"; then
              echo "- **$base**: PASSED"
            else
              errors=$(grep -oP '\d+ errors' "$log" | head -1)
              echo "- **$base**: FAILED ($errors)"
            fi
          done

      - name: Run parallel consistency checks
        run: python scripts/validate_parallel.py

      - name: Commit validation logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f validation/
          git diff --cached --quiet || git commit -m "ci: update validation logs"
          git push

      - name: Fail if any treebank has errors
        if: env.failed == '1'
        run: |
          echo "Some treebanks failed validation. See individual logs in validation/."
          exit 1
